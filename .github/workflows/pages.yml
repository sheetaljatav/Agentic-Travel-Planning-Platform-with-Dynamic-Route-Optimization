name: Deploy frontend to GitHub Pages

# Builds the React app pointed at the live Render backend and publishes it to
# GitHub Pages. The bundled sample itinerary remains a fallback if the backend
# is unreachable. One-time setup: repo Settings > Pages > Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install
        working-directory: frontend
        run: npm ci || npm install
      - name: Build (live backend + Pages base path)
        working-directory: frontend
        env:
          # Point Pages at the live Render backend; the bundled sample remains a
          # fallback if the (free, sleep-prone) backend is unreachable.
          VITE_API_URL: "https://agentic-travel-planner-3z7m.onrender.com"
          VITE_BASE: "/Agentic-Travel-Planning-Platform-with-Dynamic-Route-Optimization/"
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
