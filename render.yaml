# Render Blueprint — one-click FREE deploy.
# In Render: New > Blueprint > connect this repo > Apply.
# Provisions a free Postgres + a single web service that serves BOTH the
# FastAPI API and the built React app (one URL, no CORS).
databases:
  - name: travel-db
    plan: free
    databaseName: travel
    user: travel

services:
  - type: web
    name: agentic-travel-planner
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: travel-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      # Optional API keys — add in the Render dashboard to upgrade data quality.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: OPENTRIPMAP_API_KEY
        sync: false
      - key: AMADEUS_CLIENT_ID
        sync: false
      - key: AMADEUS_CLIENT_SECRET
        sync: false
