# Render Blueprint — one-click FREE deploy.
# In Render: New > Blueprint > connect this repo > Apply.
# A single free web service serves BOTH the FastAPI API and the built React app
# (one URL, no CORS). It uses SQLite by default so it deploys on the free tier
# without a managed database (Render allows only one free Postgres per account).
# For persistent Postgres, set DATABASE_URL below to a free Neon/Supabase URL.
services:
  - type: web
    name: agentic-travel-planner
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./travel.db
      - key: CORS_ORIGINS
        value: "*"
      # Optional API keys — add in the Render dashboard to upgrade data quality.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: ORS_API_KEY
        sync: false
      - key: OPENTRIPMAP_API_KEY
        sync: false
      - key: AMADEUS_CLIENT_ID
        sync: false
      - key: AMADEUS_CLIENT_SECRET
        sync: false
